name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake qt6-base-dev qt6-declarative-dev libssl-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Verify .so exists
        run: |
          test -f build/kv_module_plugin.so || { echo "ERROR: .so not found"; find build -name "*.so" | head -5; exit 1; }
          cp build/kv_module_plugin.so kv_module_plugin-linux-x86_64.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kv_module_plugin-linux-x86_64
          path: kv_module_plugin-linux-x86_64.so

  create-release:
    name: Create GitHub Release
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log ${PREV_TAG}..HEAD --oneline --no-merges | head -30 | sed 's/^/- /')
          else
            LOG=$(git log --oneline --no-merges | head -30 | sed 's/^/- /')
          fi
          printf "%s\n" "$LOG" > /tmp/changelog.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/changelog.md \
            --latest \
            artifacts/kv_module_plugin-linux-x86_64/kv_module_plugin-linux-x86_64.so

